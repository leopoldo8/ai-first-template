  - dist
  - .next
initial_prompt: |
  Next.js frontend with Clean Architecture.
  Features organized in src/features/<name>/.
  Server Components by default. Use Server Actions for mutations.
  Imports from: @ai-first/shared-types, @ai-first/shared-utils, @ai-first/ui.
